<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MY Website - 20230140128</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">MY Website - 20230140128</span>
        <a href="/" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-primary">Data Mahasiswa</h2>
            <p class="text-muted">Selamat datang di aplikasi pendataan mahasiswa sementara.</p>
        </div>
        <a href="/form" class="btn btn-success">+ Tambah Data</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="px-4">No</th>
                    <th>Nama Lengkap</th>
                    <th>NIM</th>
                    <th>Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(listMahasiswa)}">
                    <td colspan="4" class="text-center py-4 text-muted fst-italic">Belum ada data mahasiswa</td>
                </tr>
                <tr th:each="mhs, stat : ${listMahasiswa}">
                    <td class="px-4 fw-bold" th:text="${stat.count}"></td>
                    <td th:text="${mhs.nama}"></td>
                    <td th:text="${mhs.nim}"></td>
                    <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${mhs.jenisKelamin == 'Laki-laki'} ? 'bg-info text-dark' : 'bg-warning text-dark'"
                                      th:text="${mhs.jenisKelamin}">
                                </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
